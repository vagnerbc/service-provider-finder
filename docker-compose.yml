services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: npm run dev --workspace @faxinal-conectado/api
    environment:
      NODE_ENV: development
      API_PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/faxinal_conectado
      OTEL_SERVICE_NAME: faxinal-conectado-api
    ports:
      - "3333:3333"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    command: npm run dev --workspace @faxinal-conectado/web -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:3333
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    command: npx playwright test -c tests/e2e/playwright.config.ts
    environment:
      WEB_BASE_URL: http://web:5173
      API_BASE_URL: http://api:3333
    volumes:
      - .:/workspace
      - root_node_modules:/workspace/node_modules
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faxinal_conectado
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faxinal_conectado"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  root_node_modules:
  postgres_data:
