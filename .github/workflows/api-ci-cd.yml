name: API CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "688869023288"
  ECR_REPOSITORY: vagnerbc/service-provider-finder

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @faxinal-conectado/api
      - run: npm run typecheck --workspace @faxinal-conectado/api
      - run: npm test --workspace @faxinal-conectado/api
      - run: npm run build --workspace @faxinal-conectado/api
      - run: docker build -f apps/api/Dockerfile --target production -t faxinal-conectado-api .

      # OIDC/IRSA Authentication - No more access keys!
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::688869023288:role/github-action-role"
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Push API image to Amazon ECR
        env:
          IMAGE_URI: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
        run: |
          docker tag faxinal-conectado-api:latest "$IMAGE_URI:${GITHUB_SHA}"
          docker tag faxinal-conectado-api:latest "$IMAGE_URI:latest"
          docker push "$IMAGE_URI:${GITHUB_SHA}"
          docker push "$IMAGE_URI:latest"
