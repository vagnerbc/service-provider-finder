name: API CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @faxinal-conectado/api
      - run: npm run typecheck --workspace @faxinal-conectado/api
      - run: npm test --workspace @faxinal-conectado/api
      - run: npm run build --workspace @faxinal-conectado/api
      - run: docker build -f apps/api/Dockerfile --target production -t faxinal-conectado-api .

      # OIDC/IRSA Authentication - No more access keys!
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::688869023288:role/GitHubOIDCRole"
          aws-region: "us-east-1"

      - name: ECS Fargate deployment readiness
        run: |
          aws ecs ls
