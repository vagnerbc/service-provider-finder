name: Web CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  S3_BUCKET: service-provider-finder

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @faxinal-conectado/web
      - run: npm run typecheck --workspace @faxinal-conectado/web
      - run: npm test --workspace @faxinal-conectado/web
      - run: npm run build --workspace @faxinal-conectado/web

      # OIDC/IRSA Authentication - No more access keys!
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::688869023288:role/github-action-role"
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy web build to S3
        run: |
          aws s3 sync apps/web/dist "s3://$S3_BUCKET" --delete

      - name: Set no-cache headers for SPA entrypoint
        run: |
          aws s3 cp "s3://$S3_BUCKET/index.html" "s3://$S3_BUCKET/index.html" \
            --metadata-directive REPLACE \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
